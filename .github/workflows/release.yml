name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  crates_io_publish:
    name: Crates.io Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to Crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  python_wheel:
    name: Python Wheel
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
            maturin-args: --release -i python --out dist --features gpu
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            maturin-args: --release -i python --out dist --features gpu
          - os: macos-15-intel
            suffix: macos-intel
            maturin-args: --release -i python --out dist --features gpu --features blas-accelerate
          - os: macos-latest
            suffix: macos-arm
            maturin-args: --release -i python --out dist --features gpu --features blas-accelerate
          - os: windows-latest
            suffix: windows
            maturin-args: --release -i python --out dist --features gpu
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.maturin-args }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.suffix }}
          path: dist/*.whl

  python_sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  python_publish:
    name: Publish Python
    needs: [python_wheel, python_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
